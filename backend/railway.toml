[build]
builder = "NIXPACKS"
buildCommand = "composer install --no-dev --optimize-autoloader && mkdir -p config/jwt && php bin/console lexik:jwt:generate-keypair --skip-if-exists"

[deploy]
startCommand = "php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration && php bin/console cache:warmup && php -S 0.0.0.0:$PORT -t public/"
healthcheckPath = "/api/docs"
restartPolicyType = "ON_FAILURE"
